<!DOCTYPE html>
<html lang="es">
<head>

<script>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iniciar sesión — EduGamePlay</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0e0e1a;--bg2:#16162a;--bg3:#1e1e38;
  --accent:#facc15;--accent2:#f97316;
  --purple:#a78bfa;--green:#4ade80;--blue:#60a5fa;
  --pink:#f472b6;--red:#f87171;
  --text:#f1f0e8;--muted:#6b6b8a;
  --border:rgba(255,255,255,0.07);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:20px;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,rgba(167,139,250,0.12) 0%,transparent 70%),
    var(--bg);
  overflow-x:hidden;
}

/* Estrellas */
.star{position:fixed;border-radius:50%;background:#fff;pointer-events:none;animation:twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);z-index:0;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.6}}

/* Logo top */
.top-logo{
  text-decoration:none;margin-top:20px;margin-bottom:40px;position:relative;z-index:1;
  display:flex;align-items:center;gap:10px;
}
.top-logo-text{
  font-family:'Fredoka One',cursive;font-size:clamp(24px,6vw,32px);line-height:1;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 50%,var(--pink) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* Card */
.login-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:clamp(24px,5vw,36px);
  width:100%;max-width:420px;
  position:relative;z-index:1;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}
.card-icon{
  font-size:clamp(40px,10vw,56px);
  text-align:center;margin-bottom:8px;
}
.card-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(22px,6vw,28px);
  text-align:center;color:var(--text);
  margin-bottom:6px;line-height:1.2;
}
.card-sub{
  text-align:center;color:var(--muted);
  font-size:clamp(12px,3vw,14px);
  margin-bottom:24px;line-height:1.5;
}

/* Form */
.form-group{margin-bottom:14px;}
.form-label{
  display:block;font-size:11px;font-weight:800;color:var(--purple);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;
}
.form-input{
  width:100%;padding:12px 14px;
  font-family:'Nunito',sans-serif;font-size:15px;
  background:rgba(0,0,0,.3);color:var(--text);
  border:1.5px solid var(--border);border-radius:10px;
  outline:none;min-height:48px;
  transition:border-color .15s;
}
.form-input:focus{border-color:var(--purple);background:rgba(0,0,0,.5);}
.form-input::placeholder{color:var(--muted);}

/* Password toggle */
.password-wrap{position:relative;}
.password-toggle{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:transparent;border:none;cursor:pointer;
  font-size:18px;color:var(--muted);padding:6px;
  -webkit-tap-highlight-color:transparent;
}
.password-toggle:active{color:var(--text);}

/* Error/Success message */
.alert{
  padding:10px 14px;border-radius:10px;
  font-size:13px;line-height:1.5;margin-bottom:14px;
  display:none;
}
.alert.show{display:block;}
.alert.error{
  background:rgba(248,113,113,.12);
  border:1px solid rgba(248,113,113,.3);
  color:var(--red);
}
.alert.success{
  background:rgba(74,222,128,.12);
  border:1px solid rgba(74,222,128,.3);
  color:var(--green);
}
.alert.info{
  background:rgba(167,139,250,.12);
  border:1px solid rgba(167,139,250,.3);
  color:var(--purple);
}

/* Submit */
.submit-btn{
  width:100%;background:var(--accent);color:#1a1a00;
  font-family:'Fredoka One',cursive;
  font-size:clamp(15px,4vw,17px);
  padding:14px;border:none;border-radius:12px;
  cursor:pointer;border-bottom:4px solid #b8960f;
  min-height:52px;margin-top:8px;letter-spacing:.5px;
  transition:transform .15s,border-bottom-width .15s,opacity .2s;
  -webkit-tap-highlight-color:transparent;
}
.submit-btn:active:not(:disabled){transform:translateY(2px);border-bottom-width:1px;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.submit-btn .spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(26,26,0,.3);border-top-color:#1a1a00;
  border-radius:50%;animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Forgot password */
.forgot-link{
  display:block;text-align:center;
  margin-top:16px;font-size:13px;
  color:var(--muted);text-decoration:none;
  padding:8px;
  transition:color .15s;
}
.forgot-link:active,.forgot-link:hover{color:var(--purple);}

/* Back to landing */
.back-link{
  margin-top:24px;color:var(--muted);font-size:13px;
  text-decoration:none;padding:10px;
  position:relative;z-index:1;
  transition:color .15s;
}
.back-link:active,.back-link:hover{color:var(--purple);}

/* Footer mini */
.footer-mini{
  margin-top:auto;padding:20px 16px 10px;
  text-align:center;color:var(--muted);
  font-size:11px;line-height:1.6;
  position:relative;z-index:1;
}
.footer-mini-brand{
  font-family:'Fredoka One',cursive;font-size:13px;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* Modal de recuperación */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);backdrop-filter:blur(4px);
  z-index:100;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:clamp(20px,5vw,28px);
  max-width:400px;width:100%;
}
.modal-close{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);border-radius:8px;
  padding:10px 20px;margin-top:8px;
  font-family:'Nunito',sans-serif;font-size:13px;
  cursor:pointer;width:100%;
  -webkit-tap-highlight-color:transparent;
}
</style>
</head>
<body>

<!-- Logo arriba (link a landing) -->
<a class="top-logo" href="index.html">
  <span class="top-logo-text">EduGamePlay</span>
</a>

<!-- Card de login -->
<div class="login-card">
  <div class="card-icon">🎮</div>
  <div class="card-title">Bienvenido de vuelta</div>
  <div class="card-sub">Ingresa con tu cuenta de maestro o alumno</div>

  <!-- Alert global -->
  <div class="alert" id="alert"></div>

  <!-- Formulario -->
  <form id="loginForm" autocomplete="on">
    <div class="form-group">
      <label class="form-label" for="email">Correo electrónico</label>
      <input class="form-input" type="email" id="email" name="email"
             placeholder="tu@correo.com" autocomplete="email" required/>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <div class="password-wrap">
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required
               style="padding-right:44px;"/>
        <button type="button" class="password-toggle" id="pwToggle" tabindex="-1" aria-label="Mostrar/ocultar contraseña">👁️</button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      🔐 Iniciar sesión
    </button>
  </form>

  <a href="#" class="forgot-link" id="forgotLink">¿Olvidaste tu contraseña?</a>
</div>

<!-- Link para volver al landing -->
<a class="back-link" href="index.html">← Volver al inicio</a>

<!-- Footer -->
<div class="footer-mini">
  <div><span class="footer-mini-brand">EduGamePlay</span> Versión Beta 0.2</div>
  <div>© 2026 Juan Pariona</div>
</div>

<!-- Modal recuperación -->
<div class="modal-overlay" id="recoverModal">
  <div class="modal-box">
    <div class="card-icon" style="font-size:40px;margin-bottom:6px;">📧</div>
    <div class="card-title" style="font-size:20px;">Recuperar contraseña</div>
    <div class="card-sub">Te enviaremos un correo para restablecer tu contraseña. Revisa tu bandeja de entrada y spam.</div>

    <div class="alert" id="recoverAlert"></div>

    <div class="form-group">
      <label class="form-label" for="recoverEmail">Correo electrónico</label>
      <input class="form-input" type="email" id="recoverEmail"
             placeholder="tu@correo.com" required/>
    </div>

    <button class="submit-btn" id="recoverBtn">📧 Enviar correo</button>
    <button class="modal-close" id="closeModal">Cancelar</button>
  </div>
</div>

<!-- Firebase como módulo -->
<script type="module">
import { auth, db } from './js/firebase-config.js';
import {
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── HELPERS ──
function showAlert(el, message, type='error'){
  el.textContent = message;
  el.className = `alert show ${type}`;
}
function hideAlert(el){
  el.className = 'alert';
}

// Traducción de errores de Firebase al español
function translateError(code){
  const errors = {
    'auth/invalid-email': 'El correo no tiene un formato válido.',
    'auth/user-disabled': 'Esta cuenta ha sido deshabilitada. Contacta al administrador.',
    'auth/user-not-found': 'No existe una cuenta con ese correo.',
    'auth/wrong-password': 'Contraseña incorrecta.',
    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    'auth/too-many-requests': 'Demasiados intentos fallidos. Intenta en unos minutos.',
    'auth/network-request-failed': 'Sin conexión a internet. Verifica tu red.',
    'auth/missing-password': 'Ingresa tu contraseña.',
  };
  return errors[code] || 'Error al iniciar sesión. Intenta de nuevo.';
}

// ── REDIRECCIÓN SEGÚN ROL (con logs debug) ──
async function redirectUsuario(user){
  console.log('🔍 [DEBUG] UID autenticado:', user.uid);
  const userDoc = await getDoc(doc(db, 'users', user.uid));
  console.log('🔍 [DEBUG] ¿Documento existe en Firestore?', userDoc.exists());
  if(userDoc.exists()){
    const data = userDoc.data();
    console.log('🔍 [DEBUG] Datos del documento:', data);
    console.log('🔍 [DEBUG] primerLogin =', data.primerLogin, 'tipo:', typeof data.primerLogin);
    console.log('🔍 [DEBUG] rol =', data.rol, 'tipo:', typeof data.rol);
    if(data.primerLogin === true){
      console.log('↪️ [DEBUG] primerLogin true → completar-perfil.html');
      window.location.href = 'completar-perfil.html';
    } else if(data.rol === 'admin'){
      console.log('✅ [DEBUG] Rol admin → admin.html');
      window.location.href = 'admin.html';
    } else {
      console.log('✅ [DEBUG] Rol', data.rol, '→ dashboard.html');
      window.location.href = 'dashboard.html';
    }
  } else {
    console.warn('⚠️ [DEBUG] Documento NO existe → completar-perfil.html');
    window.location.href = 'completar-perfil.html';
  }
}

// ── SI YA ESTÁ AUTENTICADO, REDIRIGIR ──
onAuthStateChanged(auth, async (user)=>{
  if(user){
    // Verificar si completó el perfil
    try{
      await redirectUsuario(user);
    } catch(err){
      console.error('Error verificando usuario:', err);
    }
  }
});

// ── TOGGLE PASSWORD ──
const pwInput = document.getElementById('password');
const pwToggle = document.getElementById('pwToggle');
pwToggle.addEventListener('click', ()=>{
  if(pwInput.type === 'password'){
    pwInput.type = 'text';
    pwToggle.textContent = '🙈';
  } else {
    pwInput.type = 'password';
    pwToggle.textContent = '👁️';
  }
});

// ── LOGIN FORM ──
const form = document.getElementById('loginForm');
const alertEl = document.getElementById('alert');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  hideAlert(alertEl);

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if(!email || !password){
    showAlert(alertEl, 'Completa todos los campos.', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>Iniciando sesión...';

  try{
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    showAlert(alertEl, '✓ Sesión iniciada. Redirigiendo...', 'success');

    // Verificar si el usuario tiene documento en Firestore y si completó perfil
    setTimeout(async ()=>{
      await redirectUsuario(user);
    }, 800);

  } catch(err){
    console.error('Login error:', err);
    showAlert(alertEl, translateError(err.code), 'error');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '🔐 Iniciar sesión';
  }
});

// ── RECUPERAR CONTRASEÑA ──
const forgotLink = document.getElementById('forgotLink');
const recoverModal = document.getElementById('recoverModal');
const closeModal = document.getElementById('closeModal');
const recoverBtn = document.getElementById('recoverBtn');
const recoverEmail = document.getElementById('recoverEmail');
const recoverAlert = document.getElementById('recoverAlert');

forgotLink.addEventListener('click', (e)=>{
  e.preventDefault();
  // Pre-llenar si ya hay email
  recoverEmail.value = document.getElementById('email').value;
  hideAlert(recoverAlert);
  recoverModal.classList.add('show');
});

closeModal.addEventListener('click', ()=>{
  recoverModal.classList.remove('show');
});
recoverModal.addEventListener('click', (e)=>{
  if(e.target === recoverModal) recoverModal.classList.remove('show');
});

recoverBtn.addEventListener('click', async ()=>{
  const email = recoverEmail.value.trim();
  if(!email){
    showAlert(recoverAlert, 'Ingresa tu correo electrónico.', 'error');
    return;
  }

  recoverBtn.disabled = true;
  recoverBtn.innerHTML = '<span class="spinner"></span>Enviando...';

  try{
    await sendPasswordResetEmail(auth, email);
    showAlert(recoverAlert, '✓ Correo enviado. Revisa tu bandeja de entrada y spam.', 'success');
    setTimeout(()=>{
      recoverModal.classList.remove('show');
      recoverBtn.disabled = false;
      recoverBtn.innerHTML = '📧 Enviar correo';
    }, 2500);
  } catch(err){
    console.error('Recover error:', err);
    showAlert(recoverAlert, translateError(err.code), 'error');
    recoverBtn.disabled = false;
    recoverBtn.innerHTML = '📧 Enviar correo';
  }
});
</script>

<script>
// Estrellas decorativas
const starCount = window.innerWidth < 480 ? 15 : 35;
for(let i=0;i<starCount;i++){
  const s=document.createElement('div');s.className='star';
  const sz=1+Math.random()*1.5;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`;
  document.body.appendChild(s);
}
</script>

</body>
</html>
